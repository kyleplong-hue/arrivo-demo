/* ═══ WEEK TAB ═══ */
function WeekTab({week,setWeek,guestInfo,isOwner}){

const onBDS=(e,di,bi)=>{e.stopPropagation();setDragBlock({di,bi});setDragDay(null);e.dataTransfer.effectAllowed="move";};
const onBDO=(e,di,bi)=>{e.preventDefault();e.stopPropagation();if(!dragBlock||dragBlock.di!==di||dragBlock.bi===bi)return;setWeek(w=>w.map((d,i)=>{if(i!==di)return d;const nb=[...d.blocks];const times=nb.map(b=>b.t);const it=nb.splice(dragBlock.bi,1)[0];nb.splice(bi,0,it);nb.forEach((b,j)=>b.t=times[j]);setDragBlock({di,bi});return{...d,blocks:nb};}));};

const delB=(di,bi)=>setWeek(w=>w.map((d,i)=>i===di?{...d,blocks:d.blocks.filter((_,j)=>j!==bi)}:d));
const repB=(di,bi)=>{const b=week[di].blocks[bi];const alt=getAlt(b.cat||b.tag,usedLabels);setWeek(w=>w.map((d,i)=>i===di?{...d,blocks:d.blocks.map((bl,j)=>j===bi?{id:"n"+Date.now(),t:bl.t,l:alt.l,d:alt.d,tag:alt.tag,cat:alt.cat,map:alt.map||null,book:!!alt.book}:bl)}:d));};
const dirUrl=day=>{const stops=day.blocks.filter(b=>b.map);if(!stops.length)return null;const origin=stops[0].map?stops[0].map.replace(/\+/g," "):HOME_PLACE.q.replace(/\+/g," ");const destination=stops[stops.length-1].map.replace(/\+/g," ");const waypoints=stops.slice(1,-1).filter(b=>b.map).map(s=>s.map.replace(/\+/g," ")).join("|");return"https://www.google.com/maps/dir/?api=1&origin="+encodeURIComponent(origin)+"&destination="+encodeURIComponent(destination)+(waypoints?"&waypoints="+encodeURIComponent(waypoints):"");};

return<div style={{padding:"16px 14px",maxWidth:700,margin:"0 auto"}}>
<div style={{textAlign:"center",marginBottom:18}}><h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:400,fontStyle:"italic",color:T.fg}}>{guestInfo?"Your Week, "+guestInfo.name.split(" ")[0]:"Your Week in Istanbul"}</h2><p style={{fontSize:12,color:T.mt,maxWidth:460,margin:"6px auto 0",lineHeight:1.5}}>Curated by Culinary Backstreets · Drag days to reorder · swap or delete anything</p></div>

<div key={day.id||di} draggable onDragStart={e=>onDDS(e,di)} onDragOver={e=>onDDO(e,di)} onDragEnd={()=>setDragDay(null)} style={{marginBottom:8,opacity:dragDay===di?.5:1,cursor:"grab"}}>
<button onClick={()=>setOpen(open===di?-1:di)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,background:open===di?T.wh:T.bgS,border:"1px solid "+(open===di?day.accent+"44":T.bd),borderRadius:open===di?"12px 12px 0 0":"12px",padding:"14px 16px",cursor:"pointer"}}>
<span style={{fontSize:11,color:T.mt,cursor:"grab",userSelect:"none"}}>⠿</span>
<div style={{textAlign:"left",flex:1}}>
<div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:600,color:T.fg}}>Day {di+1} {dayDate&&<span style={{fontSize:11,fontWeight:400,color:T.mt}}>· {dayDate}</span>} <span style={{color:day.accent}}>— {day.title}</span></div>
<div style={{fontSize:11,color:T.mt}}>{day.sub}</div>
</div>
{du&&<a href={du} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{fontSize:10,color:T.terra,textDecoration:"none",padding:"5px 10px",background:T.terraS,borderRadius:8,border:"1px solid "+T.terra+"20",whiteSpace:"nowrap"}}>Route</a>}
<button onClick={e=>{e.stopPropagation();if(week.length>1)setWeek(w=>w.filter((_,i)=>i!==di));}} title="Delete day" style={{fontSize:12,color:T.red,background:T.red+"08",border:"1px solid "+T.red+"20",borderRadius:7,padding:"4px 8px",cursor:"pointer",fontWeight:600}}>✕</button>
<span style={{color:day.accent,transform:open===di?"rotate(180deg)":"none",fontSize:14,transition:"transform .15s"}}>▾</span>
</button>
{open===di&&<div style={{background:T.wh,borderRadius:"0 0 12px 12px",padding:"8px 6px 6px",border:"1px solid "+day.accent+"22",borderTop:"none"}}>
{day.blocks.map((b,bi)=>{const s=TS[b.tag]||TS.lunch;const iDB=dragBlock&&dragBlock.di===di&&dragBlock.bi===bi;
return(<React.Fragment key={b.id||bi}>
{b.dr&&bi>0&&<div style={{display:"flex",gap:7,marginBottom:1}}>
<div style={{width:52,flexShrink:0}}/><div style={{width:14,display:"flex",justifyContent:"center"}}><div style={{width:1,height:14,background:T.mt+"30"}}/></div>

</div>}
<div draggable onDragStart={e=>onBDS(e,di,bi)} onDragOver={e=>onBDO(e,di,bi)} onDragEnd={()=>setDragBlock(null)}
style={{display:"flex",gap:7,marginBottom:5,opacity:iDB?.4:1,cursor:"grab"}}>
<div style={{width:52,textAlign:"right",paddingTop:9,flexShrink:0}}>{editTime&&editTime.di===di&&editTime.bi===bi?<input autoFocus type="text" defaultValue={b.t} onBlur={e=>{const v=e.target.value.trim();if(v)setWeek(w=>w.map((d,i)=>i===di?{...d,blocks:d.blocks.map((bb,j)=>j===bi?{...bb,t:v}:bb)}:d));setEditTime(null);}} onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape")setEditTime(null);}} style={{width:48,fontSize:10,color:T.mt,background:"transparent",border:"1px solid "+T.bd,borderRadius:4,padding:"2px 4px",textAlign:"right",outline:"none"}}/>:<span onClick={()=>setEditTime({di,bi})} style={{fontSize:10,color:T.mt,cursor:"pointer",borderBottom:"1px dashed "+T.bd}} title="Click to edit time">{b.t}</span>}</div>
<div style={{display:"flex",flexDirection:"column",alignItems:"center",width:14}}><div style={{width:7,height:7,borderRadius:"50%",background:s.a,marginTop:11,flexShrink:0}}/><div style={{width:1,flex:1,background:s.a+"18",marginTop:2}}/></div>
<div style={{flex:1,background:s.bg,borderRadius:10,padding:"10px 12px",border:"1px solid "+s.a+"15"}}>

<button onClick={()=>repB(di,bi)} title="Swap" style={{fontSize:12,color:T.terra,background:T.terraS,border:"1px solid "+T.terra+"25",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>↻ New Idea</button>
<button onClick={()=>delB(di,bi)} title="Remove" style={{fontSize:12,color:T.red,background:T.red+"10",border:"1px solid "+T.red+"25",borderRadius:7,padding:"4px 8px",cursor:"pointer",fontWeight:600}}>✕</button>

<p style={{fontSize:12,color:T.fgS,lineHeight:1.5,marginTop:3}}>{b.d}</p>
<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:4}}>{b.map&&<MapsBtn q={b.map}/>}{b.book&&<BookBadge/>}</div>
</div>
</div></React.Fragment>);})}
</div>}
</div>);})}
<button onClick={()=>{const nd={id:"new"+Date.now(),title:"New Day",sub:"Add your own activities",accent:T.terra,blocks:[]};setWeek(w=>[...w,nd]);setOpen(week.length);}} style={{width:"100%",padding:"14px",background:T.wh,border:"2px dashed "+T.bd,borderRadius:12,fontSize:13,fontWeight:600,color:T.terra,cursor:"pointer",marginTop:4}}>+ Add Day</button>
{storyOpen&&<StoryModal name={storyOpen} onClose={()=>setStoryOpen(null)}/>}
</div>;}

const addTrip=(trip)=>{const newDay={id:"trip"+Date.now(),title:trip.title,sub:trip.sub,emoji:trip.emoji,accent:trip.accent,blocks:trip.stops.map((s,j)=>({id:"ts"+Date.now()+j,t:s.t.length<6?s.t+" AM":s.t,l:s.n,d:s.d,tag:"lunch",cat:s.book?"tour":"lunch",map:s.map||null,book:!!s.book}))};setWeek(w=>[...w,newDay]);setAdded(trip.id);setTimeout(()=>{setAdded(null);setTab("week");},1200);};

yle={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:600,color:T.fg}}>{s.n}</div>}<p style={{fontSize:12,color:T.fgS,lineHeight:1.4,marginTop:2}}>{s.d}</p><div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:3}}>{s.dr&&<span style={{fontSize:10,color:T.mt}}>{s.dr}</span>}{s.map&&<MapsBtn q={s.map}/>}{s.book&&<BookBadge/>}</div></div></div>)}<button onClick={()=>addTrip(trip)} style={{width:"100%",padding:"10px",marginTop:4,background:added===trip.id?T.olive+"15":T.terra+"12",color:added===trip.id?T.olive:T.terra,border:"1px solid "+(added===trip.id?T.olive:T.terra)+"33",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>{added===trip.id?"✓ Added to Your Week!":"+ Add This Day to My Week"}</button></div>}</div>)}

{!isOwner&&<div style={{background:T.wh,borderRadius:12,padding:16,border:"1px solid "+T.bd,marginBottom:16}}>{submitted?<div style={{textAlign:"center",padding:20}}><div style={{fontSize:28,marginBottom:8}}>✅</div><div style={{fontSize:14,color:T.olive}}>Request sent!</div></div>:<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}><div><label style={{fontSize:10,color:T.mt}}>Restaurant / Tour / Experience *</label><input value={form.venue} onChange={e=>setForm({...form,venue:e.target.value})} placeholder="e.g. Çiya Sofrası dinner" style={iS}/></div><div><label style={{fontSize:10,color:T.mt}}>Guests *</label><input value={form.guests} onChange={e=>setForm({...form,guests:e.target.value})} placeholder="4 adults" style={iS}/></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}><div><label style={{fontSize:10,color:T.mt}}>Date</label><input value={form.date} onChange={e=>setForm({...form,date:e.target.value})} placeholder="Tuesday, June 10" style={iS}/></div><div><label style={{fontSize:10,color:T.mt}}>Time</label><input value={form.time} onChange={e=>setForm({...form,time:e.target.value})} placeholder="7:30 PM" style={iS}/></div></div><button onClick={submit} style={{width:"100%",padding:"10px",background:form.venue&&form.guests?T.terra:T.bgS,color:form.venue&&form.guests?"#fff":T.mt,border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:form.venue&&form.guests?"pointer":"default"}}>Submit Request</button></>}</div>}
{requests.length===0&&<div style={{textAlign:"center",padding:40,color:T.mt,fontSize:12}}>{isOwner?"No requests yet.":"Your requests will appear here."}</div>}
{requests.map(r=><div key={r.id} style={{background:T.wh,borderRadius:10,padding:14,marginBottom:8,border:"1px solid "+(r.status==="confirmed"?T.olive+"44":r.status==="declined"?T.red+"44":T.bd)}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:600}}>{r.venue}</div><span style={{fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:600,background:r.status==="confirmed"?T.oliveS:r.status==="declined"?T.red+"10":T.goldS,color:r.status==="confirmed"?T.olive:r.status==="declined"?T.red:T.gold}}>{r.status==="confirmed"?"✓ Confirmed":r.status==="declined"?"✗ Unavailable":"⏳ Pending"}</span></div><div style={{display:"flex",gap:16,fontSize:11,color:T.mt}}>{r.date&&<span>{r.date}</span>}{r.time&&<span>{r.time}</span>}{r.guests&&<span>{r.guests}</span>}</div>{isOwner&&r.status==="pending"&&<div style={{display:"flex",gap:6,marginTop:8}}><button onClick={()=>setRequests(p=>p.map(x=>x.id===r.id?{...x,status:"confirmed"}:x))} style={{flex:1,padding:"7px",background:T.oliveS,color:T.olive,border:"1px solid "+T.olive+"33",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>✓ Confirm</button><button onClick={()=>setRequests(p=>p.map(x=>x.id===r.id?{...x,status:"declined"}:x))} style={{flex:1,padding:"7px",background:T.red+"10",color:T.red,border:"1px solid "+T.red+"25",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>✗ Decline</button></div>}</div>)}
</div>;}

/* ═══ CHAT TAB ═══ */
function ChatTab({guestInfo}){const[msgs,setMsgs]=useState([{role:"assistant",content:"Merhaba! I'm your Culinary Backstreets Istanbul concierge."+(guestInfo?" Hoş geldiniz, "+guestInfo.name.split(" ")[0]+"!":"")+"\n\nI know every backstreet, every usta, every lokanta. Ask me anything — where to eat tonight, how to avoid tourist traps, which ferry to take, or what to order when you can't read the menu."}]);const[input,setInput]=useState("");const[loading,setLoading]=useState(false);const endRef=useRef(null);
useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
const chips=["Best dinner tonight?","Meyhane for beginners?","Best dumplings in Istanbul?","Best kebab in Istanbul?","Cheap & amazing lunch?","Best coffee in Istanbul?"];
const send=async t=>{if(!t.trim()||loading)return;const um={role:"user",content:t.trim()};setMsgs(p=>[...p,um]);setInput("");setLoading(true);try{const h=[...msgs.filter(m=>m.role!=="system"),um].map(m=>({role:m.role,content:m.content}));const res=await fetch(API_PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:GUIDE,messages:h})});const data=await res.json();const reply=data.content?.map(b=>b.text||"").join("\n")||"Sorry, try again!";setMsgs(p=>[...p,{role:"assistant",content:reply}]);}catch{setMsgs(p=>[...p,{role:"assistant",content:"Connection issue — try again!"}]);}setLoading(false);};
const renderMsg=text=>{const parts=linkP(text);if(typeof parts==="string")return parts;return parts.map((p,i)=>typeof p==="string"?<span key={i}>{p}</span>:<a key={i} href={MB+p.query} target="_blank" rel="noopener" style={{color:T.sky,textDecoration:"underline",textDecorationColor:T.sky+"55",textUnderlineOffset:2}}>{p.place}</a>);};
return<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 100px)",maxWidth:700,margin:"0 auto"}}><div style={{flex:1,overflowY:"auto",padding:"14px 14px 8px"}}>{msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:10}}>{m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:8,background:T.terra,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",marginRight:6,flexShrink:0,marginTop:2,fontFamily:"'Playfair Display',serif",letterSpacing:1}}>CB</div>}<div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.role==="user"?T.fg:T.wh,color:m.role==="user"?"#fff":T.fg,fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",border:m.role==="user"?"none":"1px solid "+T.bd}}>{m.role==="assistant"?renderMsg(m.content):m.content}</div></div>)}{loading&&<div style={{display:"flex",gap:6,marginBottom:10}}><div style={{width:28,height:28,borderRadius:8,background:T.terra,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",fontFamily:"'Playfair Display',serif",letterSpacing:1}}>CB</div><div style={{padding:"10px 14px",background:T.wh,borderRadius:"14px 14px 14px 4px",border:"1px solid "+T.bd,color:T.mt,fontSize:13}}><span style={{animation:"pulse 1s ease infinite"}}>●</span><span style={{animation:"pulse 1s ease infinite .2s"}}> ●</span><span style={{animation:"pulse 1s ease infinite .4s"}}> ●</span></div></div>}{msgs.length<=1&&!loading&&<div style={{marginTop:4}}><p style={{fontSize:11,color:T.mt,marginBottom:6}}>Quick questions:</p><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{chips.map((c,i)=><button key={i} onClick={()=>send(c)} style={{background:T.wh,border:"1px solid "+T.terra+"20",color:T.terra,fontSize:11,padding:"6px 10px",borderRadius:16,cursor:"pointer"}}>{c}</button>)}</div></div>}<div ref={endRef}/></div>
<div style={{padding:"8px 14px 14px",borderTop:"1px solid "+T.bd,background:T.bg,display:"flex",gap:6}}><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send(input)} placeholder="Ask about restaurants, neighborhoods, street food..." style={{flex:1,padding:"10px 14px",background:T.wh,border:"1px solid "+T.bd,borderRadius:20,color:T.fg,fontSize:13,fontFamily:"'Source Sans 3',sans-serif",outline:"none"}}/><button onClick={()=>send(input)} disabled={loading||!input.trim()} style={{padding:"10px 18px",background:input.trim()?T.terra:T.bgS,border:"none",borderRadius:20,color:input.trim()?"#fff":T.mt,fontWeight:600,fontSize:13,cursor:input.trim()?"pointer":"default"}}>Send</button></div>
</div>;}

/* ═══ OWNER TAB ═══ */
function OwnerTab({week,guests,setGuests,alts,setAlts}){
const[newG,setNewG]=useState({name:"",checkin:"",checkout:"",notes:""});
const[copied,setCopied]=useState(null);
const[apiConnected,setApiConnected]=useState(false);

const connectApi=()=>{
    setApiConnected(true);
    const fakeGuests = [
        {id:"guest1",name:"David & Emma",checkin:"2026-03-10",checkout:"2026-03-14",notes:"Looking for dumpling spots.",week:JSON.parse(JSON.stringify(week)).slice(0,5),created:Date.now()},
        {id:"guest2",name:"Chen Family",checkin:"2026-03-15",checkout:"2026-03-18",notes:"Interested in tea ceremonies.",week:JSON.parse(JSON.stringify(week)).slice(0,4),created:Date.now()},
        {id:"guest3",name:"Maria S.",checkin:"2026-03-20",checkout:"2026-03-22",notes:"Vegan, loves spicy Sichuan food.",week:JSON.parse(JSON.stringify(week)).slice(0,3),created:Date.now()},
    ];
    setGuests(p=>[...p,...fakeGuests]);
    fakeGuests.forEach(g=>saveGD(g.id,g)); // Also save to local storage for persistence
};

const[altFilter,setAltFilter]=useState("all");
const[editAlt,setEditAlt]=useState(null);const[altForm,setAltForm]=useState({});
const[newAlt,setNewAlt]=useState(false);
const allCats=[...new Set(alts.map(a=>a.cat))].sort();
const filtAlts=altFilter==="all"?alts:alts.filter(a=>a.cat===altFilter);
const iS={width:"100%",padding:"8px 10px",background:T.bgS,border:"1px solid "+T.bd,borderRadius:7,color:T.fg,fontSize:12,outline:"none",fontFamily:"'Source Sans 3',sans-serif"};

const addGuest=()=>{if(!newG.name||!newG.checkin)return;const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);const numDays=newG.checkout?Math.ceil((new Date(newG.checkout)-new Date(newG.checkin))/(86400000))+1:5;const baseWeek=JSON.parse(JSON.stringify(week)).slice(0,Math.min(numDays,week.length));const guest={id,name:newG.name,checkin:newG.checkin,checkout:newG.checkout||addDays(newG.checkin,4),notes:newG.notes,week:baseWeek,created:Date.now()};setGuests(p=>[...p,guest]);saveGD(id,guest);setNewG({name:"",checkin:"",checkout:"",notes:""});};

const genLink=g=>{const payload={id:g.id,name:g.name,checkin:g.checkin,checkout:g.checkout,week:g.week};const encoded=btoa(encodeURIComponent(JSON.stringify(payload)));const base=window.location.origin+window.location.pathname;const link=base+"?g="+g.id+"&d="+encoded;navigator.clipboard?.writeText(link);setCopied(g.id);setTimeout(()=>setCopied(null),2500);};
const delGuest=id=>{setGuests(p=>p.filter(g=>g.id!==id));try{localStorage.removeItem(SP+id);}catch{}};

return<div style={{padding:"16px 14px",maxWidth:700,margin:"0 auto"}}>
<h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:T.fg,textAlign:"center",marginBottom:16}}>Owner Dashboard</h2>

{/* GUEST MANAGER */}
<div style={{background:T.wh,borderRadius:12,padding:16,border:"1px solid "+T.terra+"28",marginBottom:16}}>
<h3 style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:T.terra,marginBottom:12}}>Guest Manager</h3>
{guests.length===0&&!apiConnected&&<div style={{background:T.bgS,borderRadius:10,padding:14,border:"1px solid "+T.bd,marginBottom:12,textAlign:"center"}}>
<p style={{fontSize:12,color:T.mt,marginBottom:10}}>Connect your booking system to import upcoming guests:</p>
<button onClick={connectApi} style={{padding:"8px 16px",background:T.sky,color:"#fff",border:"none",borderRadius:20,fontSize:13,fontWeight:600,cursor:"pointer"}}>Connect Tour API</button>
</div>}
{guests.length===0&&apiConnected&&<div style={{textAlign:"center",padding:20}}><div style={{fontSize:28,marginBottom:8}}>✅</div><div style={{fontSize:14,color:T.olive}}>3 guests imported!</div></div>}
<div style={{background:T.bgS,borderRadius:10,padding:14,border:"1px solid "+T.bd,marginBottom:12}}>
<div style={{fontSize:12,fontWeight:600,marginBottom:8}}>+ New Guest</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
<div><label style={{fontSize:10,color:T.mt}}>Guest Name *</label><input value={newG.name} onChange={e=>setNewG({...newG,name:e.target.value})} placeholder="Sarah & Mike Johnson" style={iS}/></div>
<div><label style={{fontSize:10,color:T.mt}}>Notes</label><input value={newG.notes} onChange={e=>setNewG({...newG,notes:e.target.value})} placeholder="Love spicy food, vegetarian" style={iS}/></div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
<div><label style={{fontSize:10,color:T.mt}}>Check-in *</label><input type="date" value={newG.checkin} onChange={e=>setNewG({...newG,checkin:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:10,color:T.mt}}>Check-out</label><input type="date" value={newG.checkout} onChange={e=>setNewG({...newG,checkout:e.target.value})} style={iS}/></div>
<div style={{display:"flex",alignItems:"flex-end"}}><button onClick={addGuest} style={{width:"100%",padding:"8px",background:newG.name&&newG.checkin?T.terra:T.bgS,color:newG.name&&newG.checkin?"#fff":T.mt,border:"none",borderRadius:7,fontSize:12,fontWeight:600,cursor:newG.name&&newG.checkin?"pointer":"default"}}>Create Guide</button></div>
</div></div>
{guests.length===0?<div style={{textAlign:"center",padding:20,color:T.mt,fontSize:12}}>No guests yet.</div>:
guests.map(g=><div key={g.id} style={{background:T.bgS,borderRadius:10,padding:14,marginBottom:8,border:"1px solid "+T.bd}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
<div><div style={{fontSize:14,fontWeight:600}}>{g.name}</div><div style={{fontSize:10,color:T.mt}}>{fmtDate(g.checkin)} → {fmtDate(g.checkout)} · {g.week.length} days</div></div>
<div style={{display:"flex",gap:5}}>
<button onClick={()=>genLink(g)} style={{fontSize:11,color:copied===g.id?T.olive:T.terra,background:copied===g.id?T.oliveS:T.terraS,border:"1px solid "+(copied===g.id?T.olive:T.terra)+"33",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontWeight:600}}>{copied===g.id?"✓ Copied!":"Copy Link"}</button>
<button onClick={()=>delGuest(g.id)} style={{fontSize:11,color:T.red,background:T.red+"10",border:"1px solid "+T.red+"25",borderRadius:7,padding:"5px 8px",cursor:"pointer"}}>✕</button>
</div></div>
{g.notes&&<p style={{fontSize:11,color:T.terra}}>{g.notes}</p>}
</div>)}
</div>

{/* RECOMMENDATIONS BANK */}
<div style={{background:T.wh,borderRadius:12,padding:16,border:"1px solid "+T.terra+"28"}}>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
<h3 style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:T.terra}}>Recommendations Bank ({alts.length})</h3>
<button onClick={()=>{setNewAlt(true);setAltForm({l:"",d:"",tag:"dinner",cat:"dinner",map:""});}} style={{fontSize:11,color:T.terra,background:T.terraS,border:"1px solid "+T.terra+"33",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontWeight:600}}>+ Add</button>
</div>
<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
<button onClick={()=>setAltFilter("all")} style={{fontSize:10,padding:"4px 10px",borderRadius:16,border:"1px solid "+(altFilter==="all"?T.terra:T.bd),background:altFilter==="all"?T.terraS:T.bgS,color:altFilter==="all"?T.terra:T.mt,cursor:"pointer",fontWeight:600}}>All ({alts.length})</button>
{allCats.map(c=>{const cnt=alts.filter(a=>a.cat===c).length;return<button key={c} onClick={()=>setAltFilter(altFilter===c?"all":c)} style={{fontSize:10,padding:"4px 10px",borderRadius:16,border:"1px solid "+(altFilter===c?T.terra:T.bd),background:altFilter===c?T.terraS:T.bgS,color:altFilter===c?T.terra:T.mt,cursor:"pointer",fontWeight:500}}>{c} ({cnt})</button>;})}
</div>
{newAlt&&<div style={{background:T.bgS,borderRadius:10,padding:12,border:"2px solid "+T.terra,marginBottom:10}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
<div><label style={{fontSize:9,color:T.mt}}>Name *</label><input value={altForm.l||""} onChange={e=>setAltForm({...altForm,l:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:9,color:T.mt}}>Category</label><select value={altForm.cat||"dinner"} onChange={e=>setAltForm({...altForm,cat:e.target.value})} style={{...iS,cursor:"pointer"}}>{["dinner","lunch","breakfast","street","sweet","drinks","meyhane","coffee","market","bazaar","walk","ferry","sight","tour"].map(c=><option key={c} value={c}>{c}</option>)}</select></div>
</div>
<div style={{marginBottom:6}}><label style={{fontSize:9,color:T.mt}}>Description</label><input value={altForm.d||""} onChange={e=>setAltForm({...altForm,d:e.target.value})} style={iS}/></div>
<div style={{display:"flex",gap:4}}>
<button onClick={()=>{if(altForm.l){setAlts(p=>[...p,{...altForm,tag:altForm.cat}]);setNewAlt(false);setAltForm({});}}} style={{padding:"7px 14px",background:altForm.l?T.terra:T.bgS,color:altForm.l?"#fff":T.mt,border:"none",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>Save</button>
<button onClick={()=>setNewAlt(false)} style={{padding:"7px 10px",background:T.wh,color:T.mt,border:"1px solid "+T.bd,borderRadius:7,fontSize:11,cursor:"pointer"}}>✕</button>
</div></div>}
<div style={{maxHeight:400,overflowY:"auto"}}>
{filtAlts.map((a,fi)=>{const ri=alts.indexOf(a);const s=TS[a.tag]||TS.lunch;
return<div key={ri} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:T.bgS,borderRadius:8,marginBottom:3,border:"1px solid "+T.bd}}>
<span style={{fontSize:12,width:20,textAlign:"center"}}>{s.i}</span>
<div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.l}</div><div style={{fontSize:10,color:T.mt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.d}</div></div>
<span style={{fontSize:9,color:s.a,background:s.bg,padding:"2px 6px",borderRadius:8,flexShrink:0}}>{a.cat}</span>
</div>;})}
</div></div>
</div>;}

/* ═══ APP ═══ */
function App(){
const[tab,setTab]=useState("week");
const[isOwner,setIsOwner]=useState(false);
const[week,setWeek]=useState(initWeek);
const[requests,setRequests]=useState([]);
const[guests,setGuests]=useState([]);
const[guestMode,setGuestMode]=useState(false);
const[guestInfo,setGuestInfo]=useState(null);
const[alts,setAlts]=useState([...ALTS]);

useEffect(()=>{const gId=getURLGuest();if(!gId)return;const saved=loadGD(gId);if(saved){setGuestInfo({name:saved.name,checkin:saved.checkin,checkout:saved.checkout});setWeek(saved.week);setGuestMode(true);return;}const decoded=decodeGuestURL();if(decoded){setGuestInfo({name:decoded.name,checkin:decoded.checkin,checkout:decoded.checkout});setWeek(decoded.week);saveGD(gId,decoded);setGuestMode(true);};},[]);

useEffect(()=>{if(!guestMode)return;const gId=getURLGuest();if(!gId)return;saveGD(gId,{...guestInfo,id:gId,week});},[week,guestMode,guestInfo]);

return<div style={{minHeight:"100vh",background:T.bg}}>
<Header tab={tab} setTab={setTab} isOwner={isOwner} setIsOwner={setIsOwner} guestMode={guestMode} guestInfo={guestInfo}/>
{tab==="week"&&<WeekTab week={week} setWeek={setWeek} guestInfo={guestInfo} isOwner={isOwner}/>}
{tab==="trips"&&<TripsTab setWeek={setWeek} setTab={setTab}/>}
{tab==="info"&&<InfoTab/>}
{tab==="requests"&&<RequestsTab requests={requests} setRequests={setRequests} isOwner={isOwner}/>}
{tab==="chat"&&<ChatTab guestInfo={guestInfo}/>}
{tab==="owner"&&isOwner&&<OwnerTab week={week} guests={guests} setGuests={setGuests} alts={alts} setAlts={setAlts}/>}
<div style={{textAlign:"center",padding:"28px 20px 20px"}}>
<div style={{fontSize:11,color:T.mtL,lineHeight:1.8}}>
<span style={{color:T.terra,fontWeight:700}}>DEMO</span> · Built for Culinary Backstreets by <span style={{fontWeight:600,color:T.mt}}>Arrivo</span>
</div></div>
</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
