// Haversine distance in km
function hav(a,b){
const R=6371,toR=Math.PI/180;
const dLat=(b[0]-a[0])*toR,dLon=(b[1]-a[1])*toR;
const x=Math.sin(dLat/2)**2+Math.cos(a[0]*toR)*Math.cos(b[0]*toR)*Math.sin(dLon/2)**2;
return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function travelTime(origin,mapQ){
if(!mapQ)return null;
const dest=COORDS[mapQ];if(!dest)return null;
const km=hav(origin,dest);if(km<0.15)return null; // at the villa
const walkMin=Math.round(km/5*60/5)*5;
const driveMin=Math.max(5,Math.round(km/DRIVE_SPD*60/5)*5);
return{km,walkMin,driveMin};
}

function fD(s){if(!s)return"";return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}
function aD(s,n){const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return d;}

// UTF-8 safe base64 using TextEncoder
function toB64(s){
const bytes=new TextEncoder().encode(s);
let bin="";for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
return btoa(bin);
}
function fromB64(s){
const bin=atob(s);
const bytes=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
return new TextDecoder().decode(bytes);
}

// Clipboard with fallback + prompt as last resort
function copyText(text){
try{
const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;top:0;left:0;opacity:0";
document.body.appendChild(ta);ta.focus();ta.select();
const ok=document.execCommand("copy");
document.body.removeChild(ta);
if(!ok)throw new Error("execCommand failed");
}catch(e){
try{navigator.clipboard.writeText(text)}catch(e2){
window.prompt("Copy this link:",text);
}
}
}

function OwTab({gs,setGs,wk}){
const[ng,sNg]=useState({name:"",ci:"",co:"",n:""});const[cp,sCp]=useState(null);
const add=()=>{if(!ng.name||!ng.ci)return;setGs([...gs,{...ng,id:Date.now()+"_"+Math.random().toString(36).slice(2,6),wk:JSON.parse(JSON.stringify(wk))}]);sNg({name:"",ci:"",co:"",n:""});};
const mkLink=(g)=>{try{const d=toB64(JSON.stringify({name:g.name,ci:g.ci,co:g.co,wk:g.wk}));return window.location.origin+window.location.pathname+"?g="+g.id+"&d="+d;}catch(e){alert("Error generating link: "+e.message);return null;}};
const cpy=g=>{const link=mkLink(g);if(!link)return;copyText(link);sCp(g.id);setTimeout(()=>sCp(null),3000);};
const iS={width:"100%",padding:"11px 14px",background:C.bgS,border:"1px solid "+C.bd,borderRadius:12,fontSize:13,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"};
return(
<div style={{padding:"24px 20px",maxWidth:680,margin:"0 auto"}}>
<div style={{textAlign:"center",marginBottom:24}}>
<h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:28,fontWeight:400}}>Owner Dashboard</h2>
</div>
<div style={{background:C.wh,borderRadius:16,border:"1px solid "+C.bd,padding:20,marginBottom:20}}>
<h3 style={{fontSize:16,fontWeight:600,marginBottom:14}}>Create Guest Guide</h3>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
<div><label style={{fontSize:12,color:C.mt,display:"block",marginBottom:4}}>Name</label><input value={ng.name} onChange={e=>sNg({...ng,name:e.target.value})} placeholder="The Smiths" style={iS}/></div>
<div><label style={{fontSize:12,color:C.mt,display:"block",marginBottom:4}}>Notes</label><input value={ng.n} onChange={e=>sNg({...ng,n:e.target.value})} placeholder="Allergies, kids..." style={iS}/></div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
<div><label style={{fontSize:12,color:C.mt,display:"block",marginBottom:4}}>Check-in</label><input type="date" value={ng.ci} onChange={e=>sNg({...ng,ci:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:12,color:C.mt,display:"block",marginBottom:4}}>Check-out</label><input type="date" value={ng.co} onChange={e=>sNg({...ng,co:e.target.value})} style={iS}/></div>
</div>
<button onClick={add} style={{width:"100%",padding:"12px",background:ng.name&&ng.ci?C.cr:C.bd,color:ng.name&&ng.ci?"#fff":C.mt,border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer"}}>Create & Share</button>
</div>
{gs.length===0&&<div style={{textAlign:"center",padding:30,color:C.mtL}}>No guests yet</div>}
{gs.map(g=>(<div key={g.id} style={{background:C.wh,borderRadius:14,border:"1px solid "+C.bd,padding:"14px 16px",marginBottom:8}}>
<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
<div style={{width:36,height:36,borderRadius:10,background:C.wmS,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:C.wm}}>{g.name.charAt(0)}</div>
<div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{g.name}</div><div style={{fontSize:12,color:C.mt}}>{fD(g.ci)} {"\u2192"} {fD(g.co)}</div></div>
<button onClick={()=>setGs(gs.filter(x=>x.id!==g.id))} style={{width:28,height:28,borderRadius:8,background:C.bgS,border:"1px solid "+C.bd,color:"#D4766A",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u2715"}</button>
</div>
<button onClick={()=>cpy(g)} style={{width:"100%",fontSize:13,color:cp===g.id?C.sg:C.cr,background:cp===g.id?C.sgS:C.crS,border:"none",borderRadius:20,padding:"10px 14px",cursor:"pointer",fontWeight:600}}>{cp===g.id?"\u2713 Link Copied!":"Copy Guest Link"}</button>
</div>))}
</div>);}

function App(){
const[tab,setTab]=useState("week");const[isO,setIsO]=useState(false);
const[wk,setWk]=useState(JSON.parse(JSON.stringify(IW)));
const[rq,setRq]=useState([]);const[gs,setGs]=useState([]);
const pr=new URLSearchParams(window.location.search);
const gid=pr.get("g");
const[gi,setGi]=useState(null);
const origin=DEF_ORIGIN;
useEffect(()=>{
if(!gid)return;
try{const s=localStorage.getItem("mn_"+gid);if(s){const d=JSON.parse(s);setWk(d.wk||wk);setGi({name:d.name,ci:d.ci,co:d.co});return;}}catch(e){}
const d=pr.get("d");if(d){try{const dc=JSON.parse(fromB64(d));setWk(dc.wk||wk);setGi({name:dc.name,ci:dc.ci,co:dc.co});localStorage.setItem("mn_"+gid,JSON.stringify(dc));}catch(e){}}
},[]);
useEffect(()=>{if(gid&&gi)try{localStorage.setItem("mn_"+gid,JSON.stringify({...gi,wk}))}catch(e){}},[wk]);
const tw=gi&&gi.ci&&gi.co?(function(){const n=Math.round((new Date(gi.co)-new Date(gi.ci))/864e5);return wk.slice(0,Math.max(1,n));}()):wk;
return(
<div style={{minHeight:"100vh",background:C.bg}}>
<Header tab={tab} setTab={setTab} isO={isO} setIsO={setIsO} gi={gi}/>
{tab==="week"&&<WkTab wk={tw} setWk={setWk} gi={gi} origin={origin}/>}
{tab==="crawls"&&<CrTab origin={origin}/>}
{tab==="essentials"&&<EsTab/>}
{tab==="bookings"&&<BkTab rq={rq} setRq={setRq} isO={isO}/>}
{tab==="chat"&&<ChTab/>}
{tab==="owner"&&isO&&<OwTab gs={gs} setGs={setGs} wk={wk}/>}
<div style={{textAlign:"center",padding:"24px 20px",fontSize:11,color:C.mtL}}>Powered by <span style={{color:C.cr,fontWeight:600}}>Arrivo</span></div>
</div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
