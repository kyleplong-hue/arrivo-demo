  const send=async()=>{if(!input.trim()||loading)return;const userMsg=input.trim();setInput("");setMsgs(p=>[...p,{role:"user",text:userMsg}]);setLoading(true);
    try{const sysPrompt=`You are the UnTour Food Tours Shanghai concierge. You have deep knowledge of Shanghai's food scene. Give specific restaurant recommendations with addresses, dishes to order (with Chinese characters when possible), and insider tips. Keep responses concise and warm. You know about: soup dumplings (XLB) at Jia Jia Tangbao & Lin Long Fang, fried dumplings at Dong Tai Xiang, sesame noodles at Wei Xiang Zhai, Shanghainese at Old Jesse & FU 1088, Sichuan at Ben Zhen, Yunnan at Lotus Eatery, hotpot at Yanji & Sister Hong, dim sum at Imperial Treasure & Seventh Son, fine dining at Tai'An Table, bars like Flair & KEV, and much more. Also help with practical Shanghai tips: VPN needed, WeChat/Alipay for payments, Didi for taxis.`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,system:sysPrompt,messages:[...msgs.slice(-6).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text})),{role:"user",content:userMsg}]})});
      const data=await res.json();const reply=data.content?.[0]?.text||"I couldn't process that. Try asking about restaurants, dishes, or Shanghai tips!";
      setMsgs(p=>[...p,{role:"assistant",text:reply}]);
    }catch(e){setMsgs(p=>[...p,{role:"assistant",text:"Connection issue. Try again!"}]);}

      <button onClick={send} disabled={loading} style={{padding:"10px 16px",background:T.gold,color:T.dark,border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>Send</button>
    </div>
  </div>;
}

/* ═══ APP ═══ */
function App(){
  const[tab,setTab]=useState("week");
  const[isOwner,setIsOwner]=useState(false);
  const[week,setWeek]=useState(JSON.parse(JSON.stringify(WEEK)));
  const[requests,setRequests]=useState([]);
  const[guests,setGuests]=useState([]);

  const guestId=getURLGuest();
  const guestMode=!!guestId;
  const[guestInfo,setGuestInfo]=useState(null);

  useEffect(()=>{
    if(!guestId)return;
    const saved=loadGD(guestId);
    if(saved){setWeek(saved.week||week);setGuestInfo({name:saved.name,checkin:saved.checkin,checkout:saved.checkout});return;}
    const decoded=decodeGuestURL();
    if(decoded){setWeek(decoded.week||week);setGuestInfo({name:decoded.name,checkin:decoded.checkin,checkout:decoded.checkout});saveGD(guestId,decoded);}
  },[]);

  useEffect(()=>{
    if(!guestId||!guestInfo)return;
    saveGD(guestId,{name:guestInfo.name,checkin:guestInfo.checkin,checkout:guestInfo.checkout,week});
  },[week]);

  const trimmedWeek=guestInfo&&guestInfo.checkin&&guestInfo.checkout?
    (()=>{const ci=new Date(guestInfo.checkin);const co=new Date(guestInfo.checkout);const nights=Math.round((co-ci)/(1000*60*60*24));return week.slice(0,Math.max(1,nights));})():week;

  return<div style={{minHeight:"100vh",background:T.dark}}>
    <Header tab={tab} setTab={setTab} isOwner={isOwner} setIsOwner={setIsOwner} guestMode={guestMode} guestInfo={guestInfo}/>
    {tab==="week"&&<WeekTab week={trimmedWeek} setWeek={setWeek} guestInfo={guestInfo}/>}
    {tab==="trips"&&<TripsTab/>}
    {tab==="info"&&<InfoTab/>}
    {tab==="requests"&&<BookingsTab requests={requests} setRequests={setRequests} isOwner={isOwner}/>}
    {tab==="chat"&&<ChatTab/>}
    {tab==="owner"&&isOwner&&<OwnerTab guests={guests} setGuests={setGuests} week={week}/>}
    <div style={{textAlign:"center",padding:"20px",fontSize:10,color:T.mut}}>Powered by <span style={{color:T.gold}}>Arrivo</span> · Built for tour operators</div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
